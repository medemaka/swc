<!-- Password Protection with Session Persistence -->
<script>
    // Check if user is already logged in
    if (localStorage.getItem('comicLibraryLoggedIn') === 'true') {
        // Already logged in, do nothing
    } else {
        // Ask for password
        var password = prompt("Enter password to access this library:");
        if (password !== "maul") {
            document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;color:#e94560;font-family:sans-serif;'>Access Denied</h1><p style='text-align:center;color:#888;font-family:sans-serif;'>Incorrect password.</p>";
            throw new Error("Access Denied");
        } else {
            // Save login status in browser storage
            localStorage.setItem('comicLibraryLoggedIn', 'true');
        }
    }
</script>

    <script>
        // Simple comic viewer with page navigation
        // Replace these with your actual page images
        const pages = [
            'page1.jpg',
            'page2.jpg',
            'page3.jpg',
            'page4.jpg'
        ];
        
        let currentPage = 0;
        const pageElement = document.getElementById('comicPage');
        const pageNumber = document.getElementById('pageNumber');
        const pageInfo = document.getElementById('pageInfo');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function loadPage(index) {
            if (pages.length === 0) {
                pageElement.innerHTML = '<p class="no-pages">No pages available</p>';
                pageNumber.textContent = '';
                pageInfo.textContent = 'Page 0 of 0';
                return;
            }
            
            if (index < 0) index = 0;
            if (index >= pages.length) index = pages.length - 1;
            currentPage = index;
            
            const img = document.createElement('img');
            img.src = pages[currentPage];
            img.alt = `Page ${currentPage + 1}`;
            img.onerror = function() {
                this.style.display = 'none';
                pageElement.innerHTML = `<p class="no-pages">Page ${currentPage + 1} not found</p><span class="page-number">${currentPage + 1} / ${pages.length}</span>`;
                pageNumber.textContent = `${currentPage + 1} / ${pages.length}`;
            };
            img.onload = function() {
                pageElement.innerHTML = '';
                pageElement.appendChild(img);
                const numSpan = document.createElement('span');
                numSpan.className = 'page-number';
                numSpan.textContent = `${currentPage + 1} / ${pages.length}`;
                pageElement.appendChild(numSpan);
                pageNumber.textContent = `${currentPage + 1} / ${pages.length}`;
            };
            
            pageInfo.textContent = `Page ${currentPage + 1} of ${pages.length}`;
            
            // Update button states
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;
            prevBtn.style.opacity = currentPage === 0 ? '0.3' : '1';
            nextBtn.style.opacity = currentPage === pages.length - 1 ? '0.3' : '1';
        }

        prevBtn.addEventListener('click', function() {
            if (currentPage > 0) loadPage(currentPage - 1);
        });

        nextBtn.addEventListener('click', function() {
            if (currentPage < pages.length - 1) loadPage(currentPage + 1);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                if (currentPage > 0) loadPage(currentPage - 1);
            } else if (e.key === 'ArrowRight') {
                if (currentPage < pages.length - 1) loadPage(currentPage + 1);
            }
        });

        // Load first page
        loadPage(0);
    </script>
