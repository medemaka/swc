<!DOCTYPE html>

<head>

  <title>0-3 ABY – Star Wars Canon Comics Collection</title>

  <!-- Password Protection -->
  <script>
    if (localStorage.getItem('comicLibraryLoggedIn') !== 'true') {
      var password = prompt("Enter password to access this library:");
      if (password !== "maul") {
        document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;color:#e94560;font-family:sans-serif;'>Access Denied</h1><p style='text-align:center;color:#888;font-family:sans-serif;'>Incorrect password.</p>";
        throw new Error("Access Denied");
      } else {
        localStorage.setItem('comicLibraryLoggedIn', 'true');
      }
    }
  </script>

  <style>
    /* ---------- RESET + GLOBAL ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Trebuchet MS', 'Arial', sans-serif;
      background: #0a0a0a;
      color: #e8d5a3;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(50, 30, 10, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(50, 30, 10, 0.3) 0%, transparent 60%),
        linear-gradient(180deg, #0a0a0a 0%, #1a0f08 100%);
      display: flex;

    }

    /* ---------- HEADER (same as index) ---------- */

      background: linear-gradient(180deg, #1a0f08 0%, #0d0d0d 100%);

      border-bottom: 2px solid #e8d5a3;

      content: '';

      font-size: 2.8rem;

      text-shadow: 0 0 30px rgba(232, 213, 163, 0.15);

      font-size: 1.1rem;
      letter-spacing: 3px;

    .header .subtitle-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e8d5a3, transparent);
      margin: 12px auto 0 auto;
    }

    /* ---------- NAV (same as index) ---------- */
    .nav-tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
      padding: 18px 20px;

    }
    .nav-tabs a:hover {
      color: #e8d5a3;
      border-bottom-color: #e8d5a3;
      background: rgba(232, 213, 163, 0.05);
    }
    .nav-tabs a.active {
      color: #e8d5a3;
      border-bottom-color: #e8d5a3;
      background: rgba(232, 213, 163, 0.08);
    }

    /* ---------- READER CONTROLS ---------- */
    .reader-controls {
      background: #0d0d0d;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;

      border-bottom: 1px solid #1a1a1a;

    }
    .reader-controls select {
      padding: 6px 12px;
      background: #1a1a1a;
      color: #e8d5a3;
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      max-width: 250px;
    }
    .reader-controls button {
      background: #1a1a1a;
      color: #e8d5a3;
      border: 1px solid #333;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .reader-controls button:hover {
      background: #2a1a0a;
      border-color: #e8d5a3;
    }
    .reader-controls .page-indicator {
      color: #8a7a5a;
      font-size: 0.85rem;
      min-width: 100px;
      text-align: center;
    }
    .reader-controls .download-btn {
      background: #1a1a1a;
      color: #e8d5a3;
      border: 1px solid #333;
      padding: 6px 14px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .reader-controls .download-btn:hover {
      background: #2a1a0a;
      border-color: #e8d5a3;
    }
    .reader-controls .back-link {
      color: #8a7a5a;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .reader-controls .back-link:hover {
      color: #e8d5a3;
    }

    /* ---------- MAIN READER ---------- */
    .reader-main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      background: #0a0a0a;
    }
    .spread-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      max-height: 80vh;
      transform-origin: center center;
      transition: transform 0.15s ease;
    }
    .spread-container img {
      max-width: 49vw;
      max-height: 80vh;
      height: auto;
      border: 1px solid #222;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      background: #000;
      image-rendering: high-quality;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 768px) {
      .header h1 { font-size: 1.8rem; letter-spacing: 3px; }
      .reader-controls { gap: 6px; padding: 8px 12px; }
      .reader-controls select { max-width: 160px; font-size: 0.75rem; }
      .reader-controls button, .reader-controls .download-btn { padding: 4px 10px; font-size: 0.75rem; }
      .spread-container { flex-direction: column; gap: 6px; }
      .spread-container img { max-width: 95vw; max-height: 45vh; }
    }
    @media (max-width: 480px) {
      .header h1 { font-size: 1.3rem; letter-spacing: 2px; }
      .nav-tabs a { padding: 8px 14px; font-size: 0.7rem; letter-spacing: 1px; }
    }

    /* ---------- FOOTER ---------- */
    .footer {
      text-align: center;
      padding: 15px 20px;
      color: #4a3a2a;
      border-top: 1px solid #1a1a1a;
      font-size: 0.8rem;
      letter-spacing: 2px;
      font-weight: 300;
      flex-shrink: 0;
    }
    .footer .line {
      width: 40px;
      height: 1px;
      background: #2a1a0a;
      margin: 0 auto 8px auto;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <h1>Star Wars Canon Comics Collection</h1>
    <p>0–3 ABY • Jason Aaron Omnibus</p>
    <div class="subtitle-line"></div>
  </header>

  <!-- ===== NAV ===== -->
  <nav class="nav-tabs">
    <a href="index.html">Home</a>
    <a href="0-3-aby.html" class="active">0-3 ABY</a>
    <a href="3-4-aby.html">3-4 ABY</a>
  </nav>

  <!-- ===== READER CONTROLS ===== -->
  <div class="reader-controls">
    <a href="index.html" class="back-link">← Library</a>

    <select id="issue-selector">
      <!-- Populated by JavaScript -->
    </select>

    <button id="prev-btn" title="Previous spread">◀</button>
    <span class="page-indicator" id="page-indicator">Page 1 / 1</span>
    <button id="next-btn" title="Next spread">▶</button>

    <button id="zoom-in" title="Zoom in">+</button>
    <button id="zoom-out" title="Zoom out">−</button>
    <button id="zoom-reset" title="Reset zoom">⟲</button>

    <a href="downloads/star-wars-2015-aaron.pdf" class="download-btn" download>⬇ PDF</a>
  </div>

  <!-- ===== READER MAIN ===== -->
  <main class="reader-main">
    <div class="spread-container" id="spread-container">
      <img id="left-img" src="" alt="Left page" />
      <img id="right-img" src="" alt="Right page" />
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="line"></div>
    <p>Your private Star Wars collection &bull; 2026</p>
  </footer>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    // ============================================================
    // DATA – Jason Aaron Omnibus (Star Wars 2015)
    // ============================================================
    const comicData = {
      title: "Star Wars (2015) by Jason Aaron",
      totalPages: 544, // Update this to match your actual page count
      issues: [
        { number: "01", title: "Skywalker Strikes", startPage: 1, endPage: 32 },
        { number: "02", title: "Showdown on the Smuggler's Moon", startPage: 33, endPage: 64 },
        { number: "03", title: "Rebel Jail", startPage: 65, endPage: 96 },
        { number: "04", title: "Last Flight of the Harbinger", startPage: 97, endPage: 128 },
        { number: "05", title: "Yoda's Secret War", startPage: 129, endPage: 160 },
        { number: "06", title: "Out Among the Stars", startPage: 161, endPage: 192 },
        { number: "07", title: "From the Journals of Old Ben Kenobi", startPage: 193, endPage: 224 },
        { number: "08", title: "The Screaming Citadel", startPage: 225, endPage: 256 },
        { number: "09", title: "Hope Dies", startPage: 257, endPage: 288 },
        { number: "10", title: "The Escape", startPage: 289, endPage: 320 },
        { number: "11", title: "The Ashes of Jedha", startPage: 321, endPage: 352 },
        { number: "12", title: "Mutiny on Mon Cala", startPage: 353, endPage: 384 },
        { number: "13", title: "The Scourging of Shu-Torun", startPage: 385, endPage: 416 },
        { number: "14", title: "War of the Bounty Hunters", startPage: 417, endPage: 448 },
        { number: "15", title: "Crimson Reign", startPage: 449, endPage: 480 },
        { number: "16", title: "Hidden Empire", startPage: 481, endPage: 512 },
        { number: "17", title: "Return of the Jedi – The Rebellion", startPage: 513, endPage: 544 }
      ]
    };

    // ============================================================
    // STATE
    // ============================================================
    let currentPage = 1;
    let zoomLevel = 1.0;
    const totalPages = comicData.totalPages;

    // ============================================================
    // DOM REFS
    // ============================================================
    const leftImg = document.getElementById('left-img');
    const rightImg = document.getElementById('right-img');
    const spreadContainer = document.getElementById('spread-container');
    const pageIndicator = document.getElementById('page-indicator');
    const issueSelector = document.getElementById('issue-selector');

    // ============================================================
    // HELPERS
    // ============================================================
    function pad(num) {
      return String(num).padStart(3, '0');
    }

    function getIssueForPage(page) {
      for (let issue of comicData.issues) {
        if (page >= issue.startPage && page <= issue.endPage) {
          return issue;
        }
      }
      return comicData.issues[comicData.issues.length - 1];
    }

    function getImagePath(issue, pageNum) {
      // pageNum is the page number within the issue (1-indexed)
      return `pages/issue-${issue.number}/${pad(pageNum)}.jpg`;
    }

    // ============================================================
    // RENDER
    // ============================================================
    function goToPage(page) {
      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;

      let leftPage = page;
      let rightPage = Math.min(page + 1, totalPages);

      // If rightPage is the same as leftPage, the spread only has one image
      const leftIssue = getIssueForPage(leftPage);
      const rightIssue = getIssueForPage(rightPage);

      const leftLocal = leftPage - leftIssue.startPage + 1;
      const rightLocal = rightPage - rightIssue.startPage + 1;

      leftImg.src = getImagePath(leftIssue, leftLocal);
      // Only load right image if it's a different page
      if (rightPage !== leftPage) {
        rightImg.src = getImagePath(rightIssue, rightLocal);
        rightImg.style.display = 'block';
      } else {
        // If only one page, hide the right image
        rightImg.style.display = 'none';
      }

      currentPage = page;
      updateUI();
    }

    function nextSpread() {
      goToPage(currentPage + 2);
    }

    function prevSpread() {
      goToPage(currentPage - 2);
    }

    function goToIssue(issueNumber) {
      const issue = comicData.issues.find(i => i.number === issueNumber);
      if (issue) {
        goToPage(issue.startPage);
      }
    }

    // ============================================================
    // UI UPDATES
    // ============================================================
    function updateUI() {
      const leftDisplay = currentPage;
      const rightDisplay = Math.min(currentPage + 1, totalPages);
      pageIndicator.textContent = `${leftDisplay}–${rightDisplay} / ${totalPages}`;

      const issue = getIssueForPage(currentPage);
      if (issue) {
        issueSelector.value = issue.number;
      }
    }

    function populateIssueSelector() {
      issueSelector.innerHTML = '';
      for (let issue of comicData.issues) {
        const opt = document.createElement('option');
        opt.value = issue.number;
        opt.textContent = `#${issue.number} – ${issue.title}`;
        issueSelector.appendChild(opt);
      }
      issueSelector.addEventListener('change', (e) => {
        goToIssue(e.target.value);
      });
    }

    // ============================================================
    // ZOOM
    // ============================================================
    function applyZoom() {
      spreadContainer.style.transform = `scale(${zoomLevel})`;
    }

    document.getElementById('zoom-in').addEventListener('click', () => {
      zoomLevel = Math.min(zoomLevel + 0.15, 3.0);
      applyZoom();
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
      zoomLevel = Math.max(zoomLevel - 0.15, 0.4);
      applyZoom();
    });

    document.getElementById('zoom-reset').addEventListener('click', () => {
      zoomLevel = 1.0;
      applyZoom();
    });

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSpread();
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevSpread();
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        zoomLevel = Math.min(zoomLevel + 0.15, 3.0);
        applyZoom();
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        zoomLevel = Math.max(zoomLevel - 0.15, 0.4);
        applyZoom();
      }
      if (e.key === 'r') {
        e.preventDefault();
        zoomLevel = 1.0;
        applyZoom();
      }
    });

    // ============================================================
    // BOOT
    // ============================================================
    populateIssueSelector();
    goToPage(1);
  </script>

</body>
</html>
